services:
  ollama:
    image: ollama/ollama:${OLLAMA_IMAGE_TAG:-rocm}
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s

    # ── NVIDIA ────────────────────────────────────────────────────────────────
    # Descomente se GPU_TYPE=nvidia
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

    # ── ROCm (AMD) ────────────────────────────────────────────────────────────
    # Descomente se GPU_TYPE=rocm
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    environment:
      - HSA_OVERRIDE_GFX_VERSION=10.3.0

  # ── Model puller (runs once, then exits) ────────────────────────────────────
  ollama-pull:
    image: ollama/ollama:${OLLAMA_IMAGE_TAG:-latest}
    container_name: ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        echo 'Ollama ready. Pulling model: $$OLLAMA_MODEL';
        ollama pull $$OLLAMA_MODEL;
        echo 'Done.'
      "
    restart: on-failure

  # ── Chainlit app ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: chainlit-app
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434

volumes:
  ollama_data: